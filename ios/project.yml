name: FilmPost

options:
  bundleIdPrefix: com.filmpost
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true

settings:
  base:
    SWIFT_VERSION: 5.10
    IPHONEOS_DEPLOYMENT_TARGET: 17.0
    GENERATE_INFOPLIST_FILE: NO
    SUPPORTS_MACCATALYST: NO
    TARGETED_DEVICE_FAMILY: 1
    CODE_SIGN_STYLE: Automatic
    # Fill this in locally before archiving or sending the build to TestFlight.
    DEVELOPMENT_TEAM: ""

packages:
  FilmPostCore:
    path: FilmPostCore

targets:
  FilmPost:
    type: application
    platform: iOS
    sources:
      - path: FilmPost
    info:
      path: FilmPost/Info.plist
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.filmpost.app
        INFOPLIST_FILE: FilmPost/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    dependencies:
      - package: FilmPostCore
        product: FilmPostCore
    scheme:
      testTargets:
        - FilmPostTests

  FilmPostTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: FilmPostTests
    dependencies:
      - target: FilmPost
      - package: FilmPostCore
        product: FilmPostCore
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.filmpost.appTests
        GENERATE_INFOPLIST_FILE: YES
